name: Build & Release

on:
  push:
    tags:
    - 'v*'
    workflow_dispatch:

permissions:
contents: write

jobs:
build-mac:
runs-on: macos-latest

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install dependencies
    run: npm install

  - name: Build Mac
    run: npx electron-builder --mac --arm64 --x64 --publish never

  - name: Upload Mac artifacts
    uses: actions/upload-artifact@v4
    with:
      name: mac-build
      path: dist

build-windows:
runs-on: windows-latest

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install dependencies
    run: npm install

  - name: Build Windows
    run: npx electron-builder --win --x64 --publish never

  - name: Upload Windows artifacts
    uses: actions/upload-artifact@v4
    with:
      name: windows-build
      path: dist

release:
needs:
- build-mac
- build-windows

runs-on: ubuntu-latest

steps:
  - name: Download Mac build
    uses: actions/download-artifact@v4
    with:
      name: mac-build
      path: release/mac

  - name: Download Windows build
    uses: actions/download-artifact@v4
    with:
      name: windows-build
      path: release/win

  - name: Show files
    run: find release -type f

  - name: Create GitHub Release
    uses: softprops/action-gh-release@v2
    with:
      tag_name: ${{ github.ref_name }}
      generate_release_notes: true
      files: |
        release/**/*.dmg
        release/**/*.exe
